<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF প্রসেসর | Premium</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Anek Bangla Font CDN -->
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Anek Bangla', sans-serif;
        }

        /* File input styling */
        .file-upload-area {
            border: 2px dashed #d1d5db;
            transition: all 0.3s ease;
        }

        .file-upload-area:hover,
        .file-upload-area.dragover {
            border-color: #4F46E5;
            background-color: #f8faff;
        }

        .file-upload-icon {
            color: #9CA3AF;
            transition: color 0.3s ease;
        }

        .file-upload-area:hover .file-upload-icon {
            color: #4F46E5;
        }
    </style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-md overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-center">
            <h1 class="text-2xl md:text-2xl font-bold text-white">লেকচার স্লাইড কনভার্টার</h1>
        </div>

        <!-- Form container -->
        <div class="p-6">
            <form id="pdfForm" class="flex flex-col space-y-5">
                <!-- Most Popular File Input Design -->
                <div class="file-upload-area rounded-xl p-6 text-center cursor-pointer" id="fileUploadArea">
                    <input type="file" name="pdf" id="pdfInput" accept="application/pdf" class="hidden">
                    <div class="file-upload-icon mb-3">
                        <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                            </path>
                        </svg>
                    </div>
                    <p class="text-gray-700 font-medium mb-1">PDF ফাইল নির্বাচন করুন</p>
                    <p class="text-gray-500 text-sm">বা ফাইলটি এখানে ড্রপ করুন</p>
                    <p class="text-gray-400 text-xs mt-2">সর্বোচ্চ সাইজ: 50MB</p>
                </div>

                <!-- Selected file info -->
                <div id="fileInfo" class="hidden bg-green-50 border border-green-200 rounded-lg p-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-green-500 mr-2" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                                </path>
                            </svg>
                            <span id="fileName" class="text-green-700 font-medium text-sm"></span>
                        </div>
                        <button type="button" id="removeFile" class="text-red-500 hover:text-red-700">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Process Button -->
                <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-lg transition duration-200">
                    আপলোড & প্রসেস করুন
                </button>
            </form>

            <!-- Result Section -->
            <div id="result" class="mt-6 text-center"></div>
        </div>

        <!-- Footer -->
        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-gray-600 text-sm">Made by Shatadhru | Premium Version</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('pdfForm');
        const resultDiv = document.getElementById('result');
        const fileInput = document.getElementById('pdfInput');
        const fileUploadArea = document.getElementById('fileUploadArea');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const removeFileBtn = document.getElementById('removeFile');

        // Fast and optimized file selection
        fileUploadArea.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', function () {
            if (this.files && this.files[0]) {
                handleFileSelection(this.files[0]);
            }
        });

        // Drag and drop functionality
        fileUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUploadArea.classList.add('dragover');
        });

        fileUploadArea.addEventListener('dragleave', () => {
            fileUploadArea.classList.remove('dragover');
        });

        fileUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUploadArea.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelection(e.dataTransfer.files[0]);
            }
        });

        // Remove file
        removeFileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.value = '';
            fileInfo.classList.add('hidden');
            fileUploadArea.classList.remove('hidden');
        });

        // Fast file handling function
        function handleFileSelection(file) {
            if (file.type !== 'application/pdf') {
                alert('দয়া করে শুধুমাত্র PDF ফাইল নির্বাচন করুন');
                return;
            }

            fileName.textContent = file.name;
            fileInfo.classList.remove('hidden');
        }

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '<p class="text-red-500 font-medium">দয়া করে একটি PDF ফাইল নির্বাচন করুন</p>';
                return;
            }

            const formData = new FormData();
            formData.append('pdf', fileInput.files[0]);

            resultDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center p-4">
                    <div class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-2"></div>
                    <p class="text-gray-700 font-medium">প্রসেস হচ্ছে...</p>
                </div>
            `;

            try {
                const response = await fetch('/api/process-pdf', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('প্রসেস ব্যর্থ হয়েছে');

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);

                resultDiv.innerHTML = `
                    <div class="bg-green-50 border border-green-200 rounded-xl p-4">
                        <h3 class="text-green-700 font-bold mb-2">সফলভাবে প্রসেস হয়েছে!</h3>
                        <a href="${url}" download="processed.pdf" 
                           class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg inline-block transition duration-200">
                            PDF ডাউনলোড করুন
                        </a>
                    </div>
                `;
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = '<p class="text-red-500 font-medium">PDF প্রসেস করতে সমস্যা হয়েছে</p>';
            }
        });
    </script>
</body>

</html>
